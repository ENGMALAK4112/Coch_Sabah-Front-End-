    body {
      background-color: #d3c3a7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;

    #ball-container {
    pointer-events: none; /* عشان ما يمنع الضغط على المحتوى */
    z-index: 50;          /* فوق المحتوى */
  }

  .ball {
    position: absolute;
    background-color: #ccc;
    background-size: cover;
    border-radius: 50%;
    transition: transform 0.4s ease-in-out;
    cursor: pointer;
    pointer-events: auto; /* تخلي الكرات تستقبل hover */
  }

  /* أحجام الكرات */
  .ball.small { width: 15px; height: 15px; }
  .ball.medium { width: 20px; height: 20px; }
  .ball.large { width: 24px; height: 24px; }

  /* حركة القفز */
  @keyframes bounceEffect {
    0% { transform: translateY(0); }
    30% { transform: translateY(-10px); }
    60% { transform: translateY(5px); }
    100% { transform: translateY(0); }
  }

  /* تطبيق الحركة عند تمرير الماوس */
  .ball:hover {
    animation: bounceEffect 0.6s ease-in-out;
  }


    .slider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      overflow: hidden;
      margin: 3rem auto;
      max-width: 1100px;
      position: relative;
      z-index: 20;
    }

    .slide {
      flex-shrink: 0;
      transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
      opacity: 1;
      transform: scale(0.85);
    }

    .slide.active {
      transform: scale(1);
      opacity: 1;
      z-index: 10;
    }

    .slider img {
      border-radius: 0.5rem;
      width: 300px;
      height: auto;
      transition: all 0.3s ease-in-out;
    }

    .slider img.active {
      width: 400px;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      cursor: pointer;
      z-index: 50;
      color: #073B3A;
    }

    .nav-arrow.left { left: 10px; }
    .nav-arrow.right { right: 10px; }

    .dots {
      text-align: center;
      margin-top: 1rem;
      z-index: 20;
      position: relative;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      margin: 0 5px;
      background-color: #999;
      border-radius: 50%;
      cursor: pointer;
    }

    .dot.active {
      background-color: #333;
    }
  </style>
</head>

<!-- ✅ النقاط -->
<div class="dots" id="dots-container">
  <span class="dot" onclick="goToSlide(0)"></span>
  <span class="dot active" onclick="goToSlide(1)"></span>
  <span class="dot" onclick="goToSlide(2)"></span>
</div>

<!-- ✅ سكربت التحكم -->
<script>
  const slides = document.querySelectorAll('.slide');
  const images = document.querySelectorAll('.slide img');
  const dots = document.querySelectorAll('.dot');
  let current = 1;

  function updateSlides() {
    slides.forEach((slide, index) => {
      slide.classList.remove('active');
      images[index].classList.remove('active');
      dots[index].classList.remove('active');
      if (index === current) {
        slide.classList.add('active');
        images[index].classList.add('active');
        dots[index].classList.add('active');
      }
    });
  }

  function nextSlide() {
    current = (current + 1) % slides.length;
    updateSlides();
  }

  function prevSlide() {
    current = (current - 1 + slides.length) % slides.length;
    updateSlides();
  }

  function goToSlide(index) {
    current = index;
    updateSlides();
  }
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const dropdownBtn = document.querySelector('.dropdown-button');
    const dropdownMenu = document.querySelector('.dropdown-menu');

    dropdownBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle('active');
      dropdownBtn.classList.toggle('active');
    });

    document.addEventListener('click', () => {
      dropdownMenu.classList.remove('active');
      dropdownBtn.classList.remove('active');
    });

    dropdownMenu.addEventListener('click', (e) => {
      e.stopPropagation();
    });
  });
</script>
