  <style>
    body {
      background-color: #d3c3a7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }

  
  #ball-container {
    pointer-events: none; /* عشان ما يمنع الضغط على المحتوى */
    z-index: 50;          /* فوق المحتوى */
  }

  .ball {
    position: absolute;
    background-color: #ccc;
    background-size: cover;
    border-radius: 50%;
    transition: transform 0.4s ease-in-out;
    cursor: pointer;
    pointer-events: auto; /* تخلي الكرات تستقبل hover */
  }

  /* أحجام الكرات */
  .ball.small { width: 15px; height: 15px; }
  .ball.medium { width: 20px; height: 20px; }
  .ball.large { width: 24px; height: 24px; }

  /* حركة القفز */
  @keyframes bounceEffect {
    0% { transform: translateY(0); }
    30% { transform: translateY(-10px); }
    60% { transform: translateY(5px); }
    100% { transform: translateY(0); }
  }

  /* تطبيق الحركة عند تمرير الماوس */
  .ball:hover {
    animation: bounceEffect 0.6s ease-in-out;
  }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.5rem;
      width: 12rem;
      background-color: #d3c3a7;
      border-radius: 0.375rem;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 50;
    }

    .dropdown-menu.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-button {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .dropdown-button.active svg {
      transform: rotate(180deg);
      transition: transform 0.3s ease;
    }
    .shadow-logo-glow {
  box-shadow: 0 0 40px 40px rgba(255, 255, 255, 0.7);
  border-radius: 100%;
  background-color: rgba(255, 255, 255, 0.7);
}
  </style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const dropdownBtn = document.querySelector('.dropdown-button');
    const dropdownMenu = document.querySelector('.dropdown-menu');

    dropdownBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle('active');
      dropdownBtn.classList.toggle('active');
    });

    document.addEventListener('click', () => {
      dropdownMenu.classList.remove('active');
      dropdownBtn.classList.remove('active');
    });

    dropdownMenu.addEventListener('click', (e) => {
      e.stopPropagation();
    });
  });
</script>
