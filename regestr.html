    body {
      background-color: #d3c3a7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }

#ball-container {
    pointer-events: none; /* عشان ما يمنع الضغط على المحتوى */
    z-index: 50;          /* فوق المحتوى */
  }

  .ball {
    position: absolute;
    background-color: #ccc;
    background-size: cover;
    border-radius: 50%;
    transition: transform 0.4s ease-in-out;
    cursor: pointer;
    pointer-events: auto; /* تخلي الكرات تستقبل hover */
  }

  /* أحجام الكرات */
  .ball.small { width: 15px; height: 15px; }
  .ball.medium { width: 20px; height: 20px; }
  .ball.large { width: 24px; height: 24px; }

  /* حركة القفز */
  @keyframes bounceEffect {
    0% { transform: translateY(0); }
    30% { transform: translateY(-10px); }
    60% { transform: translateY(5px); }
    100% { transform: translateY(0); }
  }

  /* تطبيق الحركة عند تمرير الماوس */
  .ball:hover {
    animation: bounceEffect 0.6s ease-in-out;
  }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.5rem;
      width: 12rem;
      background-color: #d3c3a7;
      border-radius: 0.375rem;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 50;
    }

    .dropdown-menu.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-button {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .dropdown-button.active svg {
      transform: rotate(180deg);
      transition: transform 0.3s ease;
    }
    .text-teal-900-custom {

    }
    .bg-teal-900-custom {
